<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Voice Changer | Real-Time Audio FX</title>
    <meta name="description" content="Modify your voice in real-time with professional effects. Minimal latency, high quality.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="icon">🎙️</span>
                <h1>Live <span>Voice</span> Changer</h1>
            </div>
            <div class="status-badge" id="mic-status">
                <span class="status-dot"></span>
                <span class="status-text">Mic Access Needed</span>
            </div>
        </header>

        <main>
            <section class="visualizer-container">
                <canvas id="visualizer"></canvas>
                <div class="active-effect-display">
                    <span id="current-effect-name">Normal Mode</span>
                </div>
            </section>

            <section class="controls-grid">
                <!-- Master Controls -->
                <div class="control-card main-actions">
                    <div class="primary-actions-row">
                        <button id="start-mic-btn" class="primary-btn">
                            <span class="btn-icon">🎤</span>
                            <span class="btn-text">Start Mic</span>
                        </button>
                        <button id="import-btn" class="primary-btn secondary-variant">
                            <span class="btn-icon">📁</span>
                            <span class="btn-text">Import Audio</span>
                        </button>
                    </div>
                    <button id="noise-reduce-btn" class="secondary-btn" style="width: 100%; margin-top: 5px; font-size: 1rem; padding: 0.8rem;">
                        <span class="btn-icon">🔇</span>
                        <span class="btn-text" id="noise-reduce-text">Noise Reduction: OFF</span>
                    </button>
                    <input type="file" id="audio-upload" accept="audio/*" hidden>
                    
                    <div class="transport-controls">
                        <button id="play-pause-btn" class="secondary-btn" disabled>
                            <span class="icon">▶️</span>
                        </button>
                        <button id="record-btn" class="record-btn" disabled title="Record Audio">
                            <span class="recording-dot"></span>
                        </button>
                    </div>
                </div>

                <!-- Volume & Intensity -->
                <div class="control-card sliders">
                    <div class="input-group">
                        <div class="label-row">
                            <label for="volume-slider">🔊 Master Volume</label>
                            <span id="volume-val">80%</span>
                        </div>
                        <input type="range" id="volume-slider" min="0" max="100" value="80">
                    </div>
                    <div class="input-group">
                        <div class="label-row">
                            <label for="intensity-slider">🎚️ Effect Intensity</label>
                            <span id="intensity-val">50%</span>
                        </div>
                        <input type="range" id="intensity-slider" min="0" max="100" value="50">
                    </div>
                </div>

                <!-- New: Connectivity & Input Settings -->
                <div class="control-card settings-panel">
                    <h3>⚙️ Advanced Settings</h3>
                    <div class="settings-grid">
                        <div class="setting-item">
                            <label class="radio-container">
                                <input type="radio" name="mic-mode" id="normal-mic" checked>
                                <span class="radio-mark"></span>
                                <span class="label-text">Normal Mic</span>
                            </label>
                            <label class="radio-container">
                                <input type="radio" name="mic-mode" id="boost-mic">
                                <span class="radio-mark"></span>
                                <span class="label-text">Increase Mic Voice</span>
                            </label>
                        </div>
                        <div class="divider"></div>
                        <button id="scan-bluetooth-btn" class="primary-btn secondary-variant bluetooth-btn">
                            <span class="btn-icon">🔹</span>
                            <span class="btn-text">Scan Bluetooth</span>
                        </button>
                    </div>
                </div>

                <!-- Effect Grid -->
                <div class="control-card effects-panel">
                    <h3>🎛️ Select Voice Effect</h3>
                    <div class="effects-grid">
                        <button class="effect-btn active" data-effect="normal">Normal</button>
                        <button class="effect-btn" data-effect="robot">Robot</button>
                        <button class="effect-btn" data-effect="deep">Deep Voice</button>
                        <button class="effect-btn" data-effect="chipmunk">Chipmunk</button>
                        <button class="effect-btn" data-effect="echo">Echo</button>
                        <button class="effect-btn" data-effect="reverb">Reverb</button>
                        <button class="effect-btn" data-effect="alien">Alien</button>
                        <button class="effect-btn" data-effect="telephone">Telephone</button>
                        <button class="effect-btn" data-effect="monster">Monster</button>
                        <button class="effect-btn" data-effect="cave">Cave</button>
                        <button class="effect-btn" data-effect="radio">Old Radio</button>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <div id="recording-status" class="hidden">
                <span class="pulse-red">●</span> Recording Live... <span id="record-timer">00:00</span>
            </div>
            <p>&copy; 2024 Live Voice Changer. Processed in real-time.</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
